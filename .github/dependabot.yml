version: 2

updates:
  # Go dependencies
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "go"
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns:
          - "*"

  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "javascript"
    open-pull-requests-limit: 5
    groups:
      web-deps:
        patterns:
          - "*"

  # E2E dependencies
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "e2e"
    open-pull-requests-limit: 3
    groups:
      e2e-deps:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci):"
    labels:
      - "dependencies"
      - "ci"
    open-pull-requests-limit: 3
    groups:
      actions-deps:
        patterns:
          - "*"
