name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - '404.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'ROADMAP.md'
      - 'index.md'
      - 'index.zh-CN.md'
      - 'assets/**'
      - '_config.yml'
      - '_layouts/**'
      - '_includes/**'
      - 'docs/**'
      - 'openspec/specs/**'
      - 'changelog/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
          future: false
          unpublished: false

      - name: Verify build
        run: |
          test -f ./_site/index.html
          test -f ./_site/docs/index.html
          test -f ./_site/assets/css/style.css

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
