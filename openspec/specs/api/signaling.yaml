openapi: 3.0.3
info:
  title: WebRTC Signaling API
  description: WebSocket-based signaling API for WebRTC peer connection establishment
  version: 1.0.0
  license:
    name: MIT
    url: https://github.com/LessUp/webrtc/blob/main/LICENSE

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /:
    get:
      summary: Main application
      description: Serves index.html with WebRTC client UI
      responses:
        '200':
          description: HTML page

  /healthz:
    get:
      summary: Health check
      description: Returns "ok" if server is running
      responses:
        '200':
          description: ok
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /ws:
    get:
      summary: WebSocket upgrade
      description: Upgrade HTTP connection to WebSocket for signaling
      responses:
        '101':
          description: Switching Protocols

components:
  schemas:
    Message:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - join
            - joined
            - leave
            - offer
            - answer
            - candidate
            - hangup
            - room_members
            - ping
            - pong
            - error
        room:
          type: string
          maxLength: 64
        from:
          type: string
          maxLength: 64
        to:
          type: string
          maxLength: 64
        sdp:
          type: object
        candidate:
          type: object
        members:
          type: array
          items:
            type: string
        code:
          type: string
        error:
          type: string

    Error:
      type: object
      properties:
        type:
          type: string
          example: error
        code:
          type: string
          enum:
            - invalid_id
            - invalid_room
            - invalid_join
            - duplicate_id
            - room_full
            - room_limit_reached
            - room_missing
            - already_joined
            - identity_locked
            - not_joined
            - invalid_target
            - target_not_found
            - membership_lost
            - unknown_type
            - rate_limited
          x-comments:
            invalid_id: 客户端 ID 格式无效
            invalid_room: 房间名格式无效
            invalid_join: 加入请求缺少必要字段
            duplicate_id: 房间内 ID 已存在
            room_full: 房间已满（50 人）
            room_limit_reached: 系统房间上限（1000）
            room_missing: 房间不存在
            already_joined: 已在房间中
            identity_locked: 身份已绑定不可更改
            not_joined: 未加入房间
            invalid_target: 目标客户端无效
            target_not_found: 目标客户端不在房间
            membership_lost: 客户端已从房间移除
            unknown_type: 消息类型不支持
            rate_limited: 消息发送过快
        error:
          type: string

x-limits:
  maxRooms: 1000
  maxClientsPerRoom: 50
  maxRoomIdLength: 64
  maxClientIdLength: 64
  sendBufferSize: 64
  sendTimeoutSeconds: 2
  maxMessageSizeBytes: 1048576

