---
layout: default
---

<div class="docs-layout">
  <aside class="docs-sidebar" role="complementary" aria-label="Documentation navigation">
    <nav class="sidebar-nav" aria-label="Documentation sections">
      <h3>Documentation</h3>
      <ul class="sidebar-sections">
        <li class="{% if page.url == '/docs/' or page.url == '/docs/index.zh-CN' %}active{% endif %}"><a href="{{ site.baseurl }}/docs/">Docs Home</a></li>
        <li class="{% if page.url contains '/docs/guide' %}active{% endif %}"><a href="{{ site.baseurl }}/docs/guide">Technical Guide</a></li>
        <li class="{% if page.url contains '/docs/signaling' %}active{% endif %}"><a href="{{ site.baseurl }}/docs/signaling">Signaling Protocol</a></li>
        <li class="{% if page.url contains '/docs/deployment' %}active{% endif %}"><a href="{{ site.baseurl }}/docs/deployment">Deployment</a></li>
        <li class="{% if page.url contains '/docs/api' %}active{% endif %}"><a href="{{ site.baseurl }}/docs/api">API Reference</a></li>
        <li class="{% if page.url contains '/docs/troubleshooting' %}active{% endif %}"><a href="{{ site.baseurl }}/docs/troubleshooting">Troubleshooting</a></li>
        <li class="{% if page.url contains '/docs/specs' %}active{% endif %}"><a href="{{ site.baseurl }}/docs/specs">OpenSpec Hub</a></li>
      </ul>
      
      <h3>Quick Links</h3>
      <ul class="sidebar-links">
        <li><a href="{{ site.baseurl }}/">Project Home</a></li>
        <li><a href="{{ site.baseurl }}/CONTRIBUTING">Contributing</a></li>
        <li><a href="{{ site.baseurl }}/ROADMAP">Roadmap</a></li>
        <li><a href="{{ site.baseurl }}/CHANGELOG">Changelog</a></li>
      </ul>
    </nav>
  </aside>

  <article class="docs-content">
    <div class="docs-header-actions">
      <a href="https://github.com/LessUp/webrtc/edit/main/{{ page.path }}" class="btn btn-ghost btn-sm" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Edit this page
      </a>
    </div>
    
    {{ content }}

     <nav class="docs-pagination" aria-label="Documentation pagination">
       <div class="pagination-prev"></div>
       <div class="pagination-next"></div>
     </nav>
   </article>
</div>
