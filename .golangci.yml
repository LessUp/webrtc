version: 2

run:
  timeout: 3m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - revive
    - misspell
    - prealloc
    - bodyclose      # HTTP body close check
    - noctx          # context.Context check
    - goconst        # Repeated string constants
    - gosec          # Security issues
    - errorlint      # Error wrapping best practice
    - tparallel      # Test parallelization
    - unparam        # Unused parameters

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - hugeParam
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: exported
        disabled: true
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
        disabled: true
  misspell:
    locale: US
  gosec:
    severity: medium
    confidence: medium

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gosec
        - errcheck
