<!-- Custom Head Elements -->

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Preload Critical Resources -->
<link rel="preload" href="{{ '/assets/css/style.css' | relative_url }}" as="style">

<!-- Open Graph & Social -->
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="{{ site.twitter.username }}">
<meta name="twitter:creator" content="{{ site.twitter.username }}">

<!-- Mobile -->
<meta name="apple-mobile-web-app-capable" content="no">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">

<!-- Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "{{ site.title }}",
  "description": "{{ site.description }}",
  "url": "{{ site.url }}{{ site.baseurl }}",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Cross-platform",
  "programmingLanguage": ["Go", "JavaScript"],
  "license": "{{ site.downloads.source.url }}/blob/main/LICENSE",
  "author": {
    "@type": "Organization",
    "name": "{{ site.author.name }}",
    "url": "{{ site.author.url }}"
  },
  "codeRepository": "{{ site.downloads.source.url }}",
  "softwareVersion": "{{ site.version | default: '1.0.0' }}",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  }
}
</script>

<!-- Breadcrumb structured data for non-homepage -->
{% if page.url != '/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.url }}{{ site.baseurl }}/"
    }{% if page.collection %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.collection | capitalize }}",
      "item": "{{ site.url }}{{ site.baseurl }}/{{ page.collection }}/"
    }{% endif %}
  ]
}
</script>
{% endif %}

<!-- No index for local development -->
{% if jekyll.environment == 'development' %}
<meta name="robots" content="noindex, nofollow">
{% endif %}
