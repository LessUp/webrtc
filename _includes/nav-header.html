<!-- Global Navigation Header -->
<nav class="site-nav">
  <div class="nav-container">
    <a href="{{ site.baseurl }}/" class="nav-brand">
      WebRTC
    </a>
    
    <ul class="nav-links">
      {% for item in site.nav %}
        <li>
          <a href="{% if item.external %}{{ item.url }}{% else %}{{ site.baseurl }}{{ item.url }}{% endif %}" 
             {% if item.external %}target="_blank" rel="noopener noreferrer" class="external"{% endif %}>
            {{ item.title }}
          </a>
        </li>
      {% endfor %}
    </ul>
    
    <div class="nav-lang">
      <a href="{{ site.baseurl }}{{ page.url | remove: '.zh-CN' }}" {% unless page.url contains '.zh-CN' %}class="active"{% endunless %}>EN</a>
      <a href="{{ site.baseurl }}{{ page.url | remove: '.zh-CN' }}.zh-CN" {% if page.url contains '.zh-CN' %}class="active"{% endif %}>中文</a>
    </div>
  </div>
</nav>
