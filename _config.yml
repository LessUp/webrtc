title: LessUp WebRTC
subtitle: Go signaling server + vanilla JavaScript WebRTC client
description: >-
  A small, polished WebRTC demo focused on readable signaling, browser-side media features,
  OpenSpec-driven maintenance, and a clear documentation experience.

url: https://lessup.github.io
baseurl: /webrtc
repository: LessUp/webrtc
lang: en
locale: en_US
version: 1.0.0
license: MIT
copyright: "© 2025-2026 LessUp"

theme: null
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

sass:
  sass_dir: assets/css
  style: compressed

nav:
  - title: Home
    url: /
    icon: 🏠
  - title: Docs
    url: /docs/
    icon: 📚
  - title: Specs
    url: /docs/specs
    icon: 📋
  - title: Changelog
    url: /CHANGELOG
    icon: 📝
  - title: GitHub
    url: https://github.com/LessUp/webrtc
    icon: ⭐
    external: true

downloads:
  source:
    label: View on GitHub
    url: https://github.com/LessUp/webrtc

defaults:
  - scope:
      path: "docs/**"
    values:
      layout: docs

exclude:
  - cmd/
  - internal/
  - web/
  - e2e/
  - deploy/
  - .claude/
  - .githooks/
  - node_modules/
  - vendor/
  - bin/
  - _site/
  - .jekyll-cache/
  - .jekyll-metadata
  - Gemfile
  - Gemfile.lock
  - Makefile
  - .air.toml
  - .editorconfig
  - .gitattributes
  - .golangci.yml
  - .env*
  - go.mod
  - go.sum
  - openspec/changes/
  - package*.json

author:
  name: LessUp
  url: https://github.com/LessUp
